methodology_summary: |
  1. Data Ingestion & Algorithmic Screening (filter_candidates_gz.py):
     The pipeline ingests a compressed dataset of 100,000 candidate profiles (`candidates.jsonl.gz`) and streams them through a prioritized heuristic screening system to separate qualified profiles from noise. The script divides the pool into passed entries (`kept_candidates.json`) and logged disqualifications (`removed_candidates.json`) using four main filtering metrics:
     - Consulting-Only Filtration: Disqualifies candidates whose entire career history is confined strictly to traditional IT consulting firms (e.g., TCS, Infosys, Wipro, Accenture) to prioritize product-engineering experience.
     - Non-Technical Role Screening: Evaluates the candidate's active position to eliminate non-tech profiles. To safeguard individuals who have successfully transitioned into engineering, a candidate is disqualified only if their current job title explicitly matches non-tech domains (e.g., marketing, HR, logistics) AND they have held that role for 18 months or more.
     - Pure Research Elimination: Evaluates academic and industry roles to isolate candidates with an exclusively academic track record. It disqualifies individuals if 60% or more of their historical roles match research-only markers (e.g., PhD, Postdoc, Research Scientist) unless explicit, verifiable production-engineering signals (e.g., APIs, pipeline building, MLOps, deployment) are detected in their descriptions.
     - Synthetic AI Wrapper Screening ("Hungry" / Shallow AI): Flags superficial AI profiles trying to over-leverage basic API integrations. It screens candidates who list both LangChain and OpenAI signatures, disqualifying them if their cumulative recent application work totals less than 12 months within a 24-month window. However, an integrated safety check prevents false negatives: if a candidate possesses foundational pre-LLM machine learning skills (e.g., BERT, vector search, XGBoost, Information Retrieval) anywhere in their career history, they are automatically preserved regardless of recent framework metrics.


  2. Synthetic Integrity & Anomaly Verification (Honeypot Filter):
     The screened subset (`kept_candidates.json`) is passed to an algorithmic integrity verification script to trap system-planted honeypots and structurally corrupt data. The script applies targeted cross-field validation rules to bifurcate verified talent into `honeypot_filtered_candidates.json` while isolating anomalous entries into `honeypot_candidates.json` based on four primary anti-fraud criteria:
     - Financial Data Inversion (`INVERTED_SALARY`): Flags profiles exhibiting programmatic anomalies where the stated minimum expected salary parameter logically exceeds the maximum expected range in INR.
     - Temporal Education Overlap (`EDU_OVERLAP`): Evaluates concurrent enrollment records by comparing start and end year boundaries across multiple entries in the education history block, trapping synthetic timelines where separate degree durations intersect.
     - Contextual Role Mismatch (`DESC_TITLE_MISMATCH`): Isolates structural discontinuities within career histories by flagging jobs whose textual description bodies heavily index for mechanical hardware engineering keywords (e.g., SolidWorks, Creo, ANSYS), yet lack matching engineering titles.
     - Experience-to-Skill Duration Discrepancy (`SKILL_EXCEEDS_CAREER`): Compares cumulative career timeline months against single-skill domain durations. Profiles are instantly classified as anomalous honeypots if individual skill expertise metrics exceed the total mathematical duration of their entire career history by more than a 3-month buffer.





